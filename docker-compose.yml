services:
  web-researcher:
    build: .
    ports:
      # Localhost-only by default: the app has no authentication, so anyone who
      # can reach the port can run searches and spend LLM quota. To expose on
      # your LAN (e.g. behind Tailscale), set QUARRY_BIND=0.0.0.0 in .env.
      - "${QUARRY_BIND:-127.0.0.1}:5000:5000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    shm_size: 1g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
